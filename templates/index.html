<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>海尔洗衣助手</title>
    <link rel="stylesheet" href="{{ style_url }}">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div>
                <div class="eyebrow">Haier Laundry WebView</div>
                <h1 id="pageTitle">洗衣</h1>
            </div>
            <div class="topbar-status-group">
                <div id="topRefreshStatus" class="topbar-refresh-text">当前页面未刷新</div>
                <div id="topStatus" class="status-pill pending">未校验</div>
            </div>
        </header>

        <main class="main-content">
            <section id="washTab" class="tab-panel active">
                <div id="washView" class="stack"></div>
            </section>

            <section id="reservationTab" class="tab-panel">
                <div id="reservationComposer" class="app-dialog hidden" aria-hidden="true">
                    <button class="app-dialog-backdrop" type="button" data-action="close-reservation-composer" aria-label="关闭新建预约"></button>
                    <div class="app-dialog-panel reservation-composer-panel" role="dialog" aria-modal="true" aria-labelledby="reservationComposerTitle">
                        <div class="reservation-composer-toolbar">
                            <h3 id="reservationComposerTitle">新建预约</h3>
                            <button class="btn btn-light" type="button" data-action="close-reservation-composer">关闭</button>
                        </div>
                        <form id="reservationForm" class="form-grid">
                            <label>
                                设备来源
                                <select id="reservationSource">
                                    <option value="scan">收藏机器</option>
                                    <option value="room">洗衣房机器</option>
                                </select>
                            </label>

                            <label id="reservationScanWrap">
                                收藏机器
                                <select id="reservationScanMachine"></select>
                            </label>

                            <label id="reservationRoomWrap" class="hidden">
                                洗衣房
                                <select id="reservationRoom"></select>
                            </label>

                            <label id="reservationMachineWrap" class="hidden">
                                洗衣机
                                <select id="reservationMachine"></select>
                            </label>

                            <label>
                                模式
                                <select id="reservationMode"></select>
                            </label>

                            <label>
                                预约类型
                                <select id="reservationScheduleType">
                                    <option value="once">单次</option>
                                    <option value="weekly">每周固定时间</option>
                                </select>
                            </label>

                            <label id="reservationTargetWrap">
                                目标时间
                                <input type="datetime-local" id="reservationTargetTime">
                            </label>

                            <label id="reservationWeekdayWrap" class="hidden">
                                每周星期
                                <select id="reservationWeekday">
                                    <option value="0">周一</option>
                                    <option value="1">周二</option>
                                    <option value="2">周三</option>
                                    <option value="3">周四</option>
                                    <option value="4">周五</option>
                                    <option value="5">周六</option>
                                    <option value="6">周日</option>
                                </select>
                            </label>

                            <label id="reservationWeeklyTimeWrap" class="hidden">
                                每周时间
                                <input type="time" id="reservationWeeklyTime">
                            </label>

                            <label>
                                提前建单分钟数
                                <input type="number" id="reservationLeadMinutes" min="1" step="1">
                            </label>

                            <label>
                                标题
                                <input type="text" id="reservationTitle" placeholder="不填则自动生成">
                            </label>

                            <button type="submit" class="btn btn-primary full-width">创建预约任务</button>
                        </form>
                    </div>
                </div>

                <div id="reservationList" class="stack"></div>
            </section>

            <section id="orderTab" class="tab-panel">
                <div id="ordersList" class="stack"></div>
                <div id="ordersSentinel" class="sentinel"></div>
                <button id="loadMoreOrdersBtn" class="btn btn-light full-width hidden" type="button">加载更多订单</button>
            </section>

            <section id="settingsTab" class="tab-panel">
                <div class="panel-card">
                    <form id="settingsForm" class="form-grid">
                        <label>
                            Token
                            <input type="password" id="settingsToken" placeholder="留空则回退到 .env 中的 HAILE_TOKEN">
                        </label>

                        <label>
                            PushPlus 链接
                            <input type="url" id="settingsPushplusUrl" placeholder="后续用于推送运行状态">
                        </label>

                        <label>
                            默认提前建单分钟数
                            <input type="number" id="settingsLeadMinutes" min="1" step="1">
                        </label>

                        <label>
                            预约轮询间隔（秒）
                            <input type="number" id="settingsPollInterval" min="5" max="3600" step="1">
                        </label>

                        <button type="submit" class="btn btn-primary full-width">保存设置</button>
                    </form>
                </div>

                <div id="settingsInfo" class="stack"></div>
            </section>
        </main>

        <nav class="tabbar">
            <button class="tabbar-btn active" data-tab="washTab" type="button">洗衣</button>
            <button class="tabbar-btn" data-tab="reservationTab" type="button">预约</button>
            <button class="tabbar-btn" data-tab="orderTab" type="button">订单</button>
            <button class="tabbar-btn" data-tab="settingsTab" type="button">设置</button>
        </nav>
    </div>

    <div id="toast" class="toast"></div>
    <div id="appDialog" class="app-dialog hidden" aria-hidden="true">
        <div class="app-dialog-backdrop"></div>
        <div class="app-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="appDialogTitle">
            <h3 id="appDialogTitle">提示</h3>
            <p id="appDialogMessage"></p>
            <div class="app-dialog-actions">
                <button id="appDialogCancel" class="btn btn-light hidden" type="button">取消</button>
                <button id="appDialogConfirm" class="btn btn-primary" type="button">确定</button>
            </div>
        </div>
    </div>

    <script>
        window.__APP_BOOTSTRAP__ = {
            allowRemote: {{ 'true' if allow_remote else 'false' }},
            sslVerify: {{ 'true' if ssl_verify else 'false' }},
            basePath: {{ base_path|tojson }}
        };
    </script>
    <script src="{{ app_js_url }}"></script>
</body>
</html>
